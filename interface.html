<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix</title>
    <link rel="icon" type="image/png" href="images/S-icon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/interface.css">
</head>
<body>

<nav class="navbar main-header">
    <div class="left-side">
        <a href="#" class="navbar-brand logo">StreamFlix</a>
        <div class="navigation">
            <a href="#" class="nav-item active" data-category="home"       onclick="setActiveNav(this); return false;">Home</a>
            <a href="#" class="nav-item"         data-category="tvshows"   onclick="setActiveNav(this); return false;">TV Shows</a>
            <a href="#" class="nav-item"         data-category="movies"    onclick="setActiveNav(this); return false;">Movies</a>
            <a href="#" class="nav-item"         data-category="games"     onclick="setActiveNav(this); return false;">Games</a>
            <a href="#" class="nav-item"         data-category="newpopular" onclick="setActiveNav(this); return false;">New &amp; Popular</a>
            <a href="#" class="nav-item"         data-category="mylist"    onclick="setActiveNav(this); return false;">My List</a>
            <a href="#" class="nav-item"         data-category="languages" onclick="setActiveNav(this); return false;">Browse by Languages</a>
        </div>
    </div>

    <div class="right-side">
        <div class="search-container" id="searchContainer">
            <span class="icon search-icon" id="searchIcon" onclick="toggleSearch()">🔍</span>
            <input
                type="text"
                class="search-input"
                id="searchInput"
                placeholder="Titles, genres, years…"
                oninput="handleSearch(this.value)"
                autocomplete="off"
            />
        </div>
        <span class="icon">🔔</span>
        <div class="profile-box">
            <img id="navAvatar" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Profile" class="avatar">
            <span id="navPersonaName" class="persona-name"></span>
            <span class="caret">▼</span>
        </div>
    </div>
</nav>

<main class="content-area">
    <div class="search-overlay hidden" id="searchOverlay"></div>
    <div id="contentRows"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/content.js"></script>
<script src="js/nav.js"></script>
<script src="js/search.js"></script>
</body>
</html>
